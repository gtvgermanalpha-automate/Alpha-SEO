# Netlify configuration for the Alpha Digital Solutions Next.js + CMS site.
# The Next Runtime plugin is declared EXPLICITLY (auto-detection is unreliable on
# a site that began as static). `publish = ".next"` is set explicitly too, to
# OVERRIDE a stale UI "Publish directory = ." left over from the static site: the
# Next runtime requires the publish dir to be the build output (.next), not the
# repo root, or it fails with "publish directory cannot be the same as base".

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Next.js runtime — required (do not remove). Without it every route 404s.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Event-triggered + serverless functions. submission-created.mjs sends the
# contact-form auto-reply (dormant until RESEND_API_KEY is set — see FORMS.md).
[functions]
  directory = "netlify/functions"
