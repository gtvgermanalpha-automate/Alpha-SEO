<html>
    <head></head>
    <body>
        <!--
          Hidden static form so Netlify's deploy-time bot can detect the "contact"
          form and register its fields. The real, styled, validated form lives in
          src/components/ContactForm.tsx and submits to this path via fetch().
          Field names here MUST stay in sync with that component. Do not delete.

          reCAPTCHA (optional): to switch on Google reCAPTCHA v2 spam protection,
          add  data-netlify-recaptcha="true"  to the <form> tag below AND set the
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY / SITE_RECAPTCHA_KEY / SITE_RECAPTCHA_SECRET
          env vars in Netlify, then redeploy. It is left off by default so the form
          works with just the honeypot. Full steps: see FORMS.md.
        -->
        <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
            <input type="hidden" name="form-name" value="contact" />
            <input name="name" type="text" />
            <input name="email" type="email" />
            <input name="phone" type="tel" />
            <input name="businessType" type="text" />
            <textarea name="message"></textarea>
            <input name="consent" type="text" />
            <input name="bot-field" type="text" />
        </form>

        <!-- Homepage "request a callback" popup. Mirrors LeadPopup.tsx field names. -->
        <form name="callback" data-netlify="true" netlify-honeypot="bot-field" hidden>
            <input type="hidden" name="form-name" value="callback" />
            <input name="name" type="text" />
            <input name="email" type="email" />
            <input name="phone" type="tel" />
            <input name="bot-field" type="text" />
        </form>

        <!-- Live-chat email capture. Mirrors ChatPanel.tsx field names. -->
        <form name="chat-lead" data-netlify="true" netlify-honeypot="bot-field" hidden>
            <input type="hidden" name="form-name" value="chat-lead" />
            <input name="email" type="email" />
            <input name="topic" type="text" />
            <input name="bot-field" type="text" />
        </form>
    </body>
</html>
