<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Alpha Digital Solutions — Premium SEO Agency, Toronto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081628"/>
      <stop offset="0.55" stop-color="#0b1f3a"/>
      <stop offset="1" stop-color="#102a4d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f1e3b5"/>
      <stop offset="1" stop-color="#d9c28a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d9c28a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#d9c28a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="150" r="360" fill="url(#glow)"/>

  <!-- Faint concentric arc motif (echoes the hero orb ring), bottom-right -->
  <g fill="none" stroke="#d9c28a" stroke-opacity="0.10">
    <circle cx="1120" cy="560" r="120" stroke-width="2"/>
    <circle cx="1120" cy="560" r="190" stroke-width="2"/>
    <circle cx="1120" cy="560" r="260" stroke-width="2"/>
  </g>

  <!-- Brand lockup -->
  <g transform="translate(96,92)">
    <rect x="0" y="0" width="46" height="46" rx="11" fill="url(#gold)"/>
    <path d="M14 33 L23 13 L32 33 M17.5 26 H28.5" fill="none" stroke="#0b1f3a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="22" font-family="Montserrat, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="3" fill="#ffffff">ALPHA</text>
    <text x="64" y="42" font-family="Montserrat, 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="4.5" fill="#e5d3a1">DIGITAL SOLUTIONS</text>
  </g>

  <!-- Headline -->
  <g font-family="Montserrat, 'Segoe UI', Arial, sans-serif" fill="#ffffff">
    <text x="94" y="300" font-size="76" font-weight="800" letter-spacing="-1">Premium <tspan fill="url(#gold)">SEO</tspan> Agency</text>
    <text x="96" y="372" font-size="34" font-weight="700" fill="#ffffff" opacity="0.96">Engineered organic growth, not guesswork.</text>
  </g>

  <!-- Gold rule -->
  <rect x="98" y="404" width="120" height="5" rx="2.5" fill="url(#gold)"/>

  <!-- Service pillars -->
  <text x="98" y="452" font-family="Montserrat, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#cdd7e6" letter-spacing="0.3">Technical &#183; On-Page &#183; Off-Page &#183; Local &#183; Reddit &amp; AEO</text>

  <!-- Footer -->
  <g font-family="Montserrat, 'Segoe UI', Arial, sans-serif" font-weight="700">
    <text x="98" y="556" font-size="24" fill="#e5d3a1" letter-spacing="0.5">alphadigitalsol.com</text>
    <text x="98" y="586" font-size="17" font-weight="600" fill="#8ea2bd" letter-spacing="0.5">Toronto, Canada &#183; White-hat &#183; Senior-led &#183; NDA-ready</text>
  </g>
</svg>
